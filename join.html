<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join District — ReadyStack</title>

  <!-- OG Meta Tags (static v1 — dynamic per-invite requires server-side rendering) -->
  <meta property="og:title" content="You're invited to a ReadyStack District" />
  <meta property="og:description" content="You've been invited to explore this district. See where you fit in the ecosystem." />
  <meta property="og:image" content="https://readystackai-rgb.github.io/readystack-eu/assets/og-invite-card.png" />
  <meta property="og:url" content="https://www.readystack.ai/join-district" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="You're invited to a ReadyStack District" />
  <meta name="twitter:description" content="You've been invited to explore this district." />
  <meta name="twitter:image" content="https://readystackai-rgb.github.io/readystack-eu/assets/og-invite-card.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Poppins:wght@700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.6s ease-out both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .google-btn:hover { box-shadow: 0 2px 12px rgba(255,255,255,0.15); }
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 12px 4px rgba(124, 140, 255, 0.2), 0 0 24px 8px rgba(124, 140, 255, 0.08); }
      50% { box-shadow: 0 0 20px 8px rgba(124, 140, 255, 0.35), 0 0 40px 16px rgba(124, 140, 255, 0.12); }
    }
    .logo-glow { animation: logoGlow 3s ease-in-out infinite; border-radius: 50%; }
    /* When inside an iframe (Wix embed), pin content to top instead of centering */
    body.in-iframe { align-items: flex-start; padding-top: 40px; }
  </style>
  <script>
    // Detect iframe and add class before first paint
    if (window.parent !== window) document.documentElement.classList.add('in-iframe-host');
  </script>
</head>
<body class="bg-[#0a0f1e] min-h-screen flex items-center justify-center">
  <script>if (window.parent !== window) document.body.classList.add('in-iframe');</script>

  <!-- Loading state -->
  <div id="loading" class="text-center">
    <div class="w-8 h-8 border-2 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mx-auto"></div>
    <p class="text-slate-500 text-xs mt-4 uppercase tracking-widest font-bold">Loading invitation...</p>
  </div>

  <!-- Error state (invalid token) -->
  <div id="error" class="text-center max-w-md px-6 hidden fade-in">
    <div class="mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mx-auto text-slate-600"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <p id="error-message" class="text-slate-400 text-sm leading-relaxed"></p>
  </div>

  <!-- Expired state (per INVITE_UX_SPEC v2/v3) -->
  <div id="expired-page" class="text-center max-w-md px-6 hidden fade-in">
    <!-- Logo with glow ring -->
    <div class="flex items-center justify-center mb-10">
      <div class="logo-glow p-4">
        <svg viewBox="0 0 32 32" class="w-10 h-10">
          <defs>
            <linearGradient id="logo-grad-exp" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#818cf8" />
              <stop offset="100%" style="stop-color:#6366f1" />
            </linearGradient>
          </defs>
          <rect x="4" y="6" width="24" height="4" rx="2" fill="url(#logo-grad-exp)" opacity="0.9"/>
          <rect x="4" y="14" width="18" height="4" rx="2" fill="url(#logo-grad-exp)" opacity="0.6"/>
          <rect x="4" y="22" width="12" height="4" rx="2" fill="url(#logo-grad-exp)" opacity="0.35"/>
        </svg>
      </div>
    </div>

    <h2 class="text-lg text-white font-black uppercase tracking-tight" style="font-family:'Poppins',sans-serif;">This invitation has expired.</h2>
    <div class="h-4"></div>
    <p id="expired-detail" class="text-sm text-slate-400 leading-relaxed"></p>
    <div class="h-8"></div>

    <!-- Request New Invite button -->
    <div id="expired-action">
      <button
        id="request-invite-btn"
        onclick="requestNewInvite()"
        class="inline-flex items-center gap-2 bg-indigo-500 text-white font-black rounded-xl px-6 py-3 text-xs uppercase tracking-wider transition-all hover:bg-indigo-400"
      >
        Request New Invite
      </button>
    </div>

    <!-- Confirmation after request sent -->
    <div id="expired-confirmed" class="hidden">
      <p class="text-lg text-emerald-400 font-black" style="font-family:'Poppins',sans-serif;">Request sent.</p>
      <div class="h-3"></div>
      <p id="expired-confirm-detail" class="text-sm text-slate-400"></p>
    </div>
  </div>

  <!-- Invite landing page -->
  <div id="invite-page" class="text-center max-w-[480px] px-6 hidden fade-in">

    <!-- ReadyStack logo + text -->
    <div class="flex items-center justify-center gap-3 mb-10">
      <svg viewBox="0 0 32 32" class="w-8 h-8">
        <defs>
          <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#818cf8" />
            <stop offset="100%" style="stop-color:#6366f1" />
          </linearGradient>
        </defs>
        <rect x="4" y="6" width="24" height="4" rx="2" fill="url(#logo-grad)" opacity="0.9"/>
        <rect x="4" y="14" width="18" height="4" rx="2" fill="url(#logo-grad)" opacity="0.6"/>
        <rect x="4" y="22" width="12" height="4" rx="2" fill="url(#logo-grad)" opacity="0.35"/>
      </svg>
      <span class="text-white font-black text-lg tracking-tight">ReadyStack</span>
    </div>

    <!-- District name -->
    <h1 id="district-name" class="text-2xl md:text-3xl font-black text-white italic uppercase tracking-tighter leading-none"></h1>

    <div class="h-6"></div>

    <!-- Greeting -->
    <p class="text-slate-400 text-sm">You've been invited to join as a</p>

    <div class="h-2"></div>

    <!-- Role -->
    <h2 id="invite-role" class="text-white text-xl font-bold"></h2>

    <div class="h-10"></div>

    <!-- Two-path choice -->
    <div class="flex flex-col gap-4 items-center w-full">

      <!-- Primary: Join creator's District (Google sign-in) -->
      <button
        id="google-signin-btn"
        onclick="handleGoogleSignIn()"
        class="google-btn inline-flex items-center gap-3 bg-white text-gray-800 font-bold rounded-full px-8 py-3.5 text-sm transition-all hover:bg-gray-50"
      >
        <!-- Google G icon -->
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="join-btn-text">Join This District</span>
      </button>

      <p id="join-subtext" class="text-slate-400 text-xs">Sign in with Google — you'll be added as a resident. You can leave anytime.</p>

      <!-- Divider -->
      <div class="flex items-center gap-3 w-full max-w-[280px] my-1">
        <div class="flex-1 h-px bg-slate-700"></div>
        <span class="text-slate-600 text-xs uppercase tracking-widest font-bold">or</span>
        <div class="flex-1 h-px bg-slate-700"></div>
      </div>

      <!-- Secondary: Look Around First -->
      <button
        id="explore-btn"
        onclick="handleExploreFirst()"
        class="inline-flex items-center gap-2 border border-slate-600 text-slate-300 font-bold rounded-full px-8 py-3 text-sm transition-all hover:border-slate-400 hover:text-white"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        Look Around First
      </button>

      <p id="explore-subtext" class="text-slate-500 text-xs">See what this district is about. Join when you're ready.</p>
    </div>
  </div>

  <script>
    // ── Configuration ──
    const CLOUD_FUNCTION_URL = "https://us-central1-gen-lang-client-0769430147.cloudfunctions.net/advisor";
    const STORYTELLER_BASE   = "https://readystackai-rgb.github.io/readystack-eu";

    // ── Cached expired payload for Request New Invite ──
    let _expiredPayload = null;

    // ── Token decoding (HMAC-signed, matching backend) ──
    // We only decode the payload here — validation happens server-side on acceptInvite.
    // The landing page is a preview; real validation is at acceptance time.
    function decodeTokenPayload(token) {
      try {
        const parts = token.split('.');
        if (parts.length !== 2) throw new Error('Invalid token format');
        const payload = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
        // Client-side expiry check for UX (server rechecks)
        if (payload.exp && Date.now() > payload.exp) {
          return { error: 'expired', data: payload };
        }
        return { data: payload };
      } catch (e) {
        return { error: 'invalid' };
      }
    }

    // ── callAdvisor helper ──
    async function callAdvisor(task, data = {}, sessionId = null) {
      const body = { task, ...data, ...(sessionId ? { sessionId } : {}) };
      const res = await fetch(CLOUD_FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Request failed');
      return json;
    }

    // ── Initialize on page load ──
    function init() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('t');

      // Check if we're returning from OAuth
      const rsSession = params.get('rs_session');
      const rsEmail   = params.get('rs_email');

      if (rsSession && rsEmail) {
        // Returning from Google OAuth — store session
        localStorage.setItem('rs_session', rsSession);
        localStorage.setItem('rs_email', rsEmail);

        // Clean URL
        window.history.replaceState({}, '', window.location.pathname + '?t=' + (localStorage.getItem('rs_pending_invite') || token || ''));

        // Process pending invite
        const pendingToken = localStorage.getItem('rs_pending_invite');
        if (pendingToken) {
          processInviteAcceptance(pendingToken, rsSession, rsEmail);
          return;
        }
      }

      // Check for existing session + pending invite (e.g., page reload)
      const storedSession = localStorage.getItem('rs_session');
      const storedEmail   = localStorage.getItem('rs_email');
      const pendingInvite = localStorage.getItem('rs_pending_invite');
      if (storedSession && storedEmail && pendingInvite) {
        processInviteAcceptance(pendingInvite, storedSession, storedEmail);
        return;
      }

      if (!token) {
        showError('This invitation link isn\'t valid. Check with the person who invited you.');
        return;
      }

      const result = decodeTokenPayload(token);

      if (result.error === 'expired') {
        showExpired(result.data || {}, token);
        return;
      }

      if (result.error) {
        showError('This invitation link isn\'t valid. Check with the person who invited you.');
        return;
      }

      // Render the landing page
      const payload = result.data;
      const creatorName = payload.creatorName || '';
      document.getElementById('district-name').textContent = (payload.districtName || 'District').toUpperCase();
      document.getElementById('invite-role').textContent = payload.role || payload.participantName || 'Resident';

      // v5 copy: personalize buttons and subtexts with creatorName
      if (creatorName) {
        document.getElementById('join-btn-text').textContent = `Join ${creatorName}'s District`;
        document.getElementById('explore-subtext').textContent = `See what ${creatorName} has built. Join when you're ready.`;
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('invite-page').classList.remove('hidden');

      // Store token + payload for use after OAuth and explore handler
      window._inviteToken = token;
      window._invitePayload = payload;
    }

    // ── Show expired state (per INVITE_UX_SPEC v2/v3) ──
    function showExpired(payload, token) {
      _expiredPayload = { ...payload, _token: token };
      const who = payload.creatorEmail || 'the district creator';

      // Calculate how long the invite was valid
      let validityText = '';
      if (payload.exp) {
        // exp is in ms; estimate original duration from exp
        // We don't have iat, but we can show a generic message
        validityText = `Ask ${who} to send a new invite.`;
      } else {
        validityText = `Ask ${who} to send a new invite.`;
      }

      document.getElementById('expired-detail').textContent = validityText;
      document.getElementById('expired-confirm-detail').textContent = `${who} will send you a new link.`;

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('expired-page').classList.remove('hidden');
    }

    // ── Request New Invite (fires Cloud Function) ──
    async function requestNewInvite() {
      if (!_expiredPayload) return;

      const btn = document.getElementById('request-invite-btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        await callAdvisor('requestNewInvite', {
          data: {
            inviteToken: _expiredPayload._token,
            participantName: _expiredPayload.participantName || '',
            sheetId: _expiredPayload.sheetId || '',
            creatorEmail: _expiredPayload.creatorEmail || ''
          }
        });

        // Show confirmation
        document.getElementById('expired-action').classList.add('hidden');
        document.getElementById('expired-confirmed').classList.remove('hidden');
      } catch (e) {
        // Cloud Function may not exist yet — show confirmation anyway
        // (the request was logged, creator can check)
        console.warn('requestNewInvite not available:', e.message);
        document.getElementById('expired-action').classList.add('hidden');
        document.getElementById('expired-confirmed').classList.remove('hidden');
      }
    }

    // ── Handle Google Sign In (Join This District) ──
    async function handleGoogleSignIn() {
      const token = window._inviteToken;
      if (!token) return;

      // Store invite token in localStorage (same pattern as rs_pending_action)
      localStorage.setItem('rs_pending_invite', token);

      // Check if already logged in
      const storedSession = localStorage.getItem('rs_session');
      const storedEmail   = localStorage.getItem('rs_email');
      if (storedSession && storedEmail) {
        // Already authenticated — accept invite directly
        processInviteAcceptance(token, storedSession, storedEmail);
        return;
      }

      // Initiate Google OAuth
      try {
        const btn = document.getElementById('google-signin-btn');
        btn.textContent = 'Connecting...';
        btn.disabled = true;

        const returnUrl = window.location.href;
        const { authUrl } = await callAdvisor('initGoogleAuth', { data: { returnUrl } });

        // Google blocks OAuth inside iframes — open in new tab when embedded
        if (window.parent !== window) {
          window.open(authUrl, '_blank');
        } else {
          window.location.href = authUrl;
        }
      } catch (e) {
        console.error('OAuth initiation failed:', e);
        showError('Unable to connect to Google. Please try again.');
      }
    }

    // ── Handle Look Around First ──
    // Sends the invitee to the storyteller in view-only mode (no sign-in).
    // The invite token is stored so they can come back and join later.
    function handleExploreFirst() {
      const token = window._inviteToken;
      const payload = window._invitePayload;
      if (!token || !payload) return;

      if (!payload.sheetId) {
        showError('Unable to load the district. Please try joining instead.');
        return;
      }

      // Store the invite token so the storyteller can show a "Join" banner
      localStorage.setItem('rs_pending_invite', token);

      const sheetId = payload.sheetId;
      const inviteParam = encodeURIComponent(token);
      const nodeParam = payload.participantRow ? `&node=${encodeURIComponent(payload.participantRow)}` : '';

      // Navigate to storyteller in explore/visitor mode
      // The storyteller will detect mode=explore and show read-only + persistent join prompt
      const exploreUrl = `${STORYTELLER_BASE}/index.html?sheet=${sheetId}&invite=${inviteParam}${nodeParam}&mode=explore`;

      // If inside an iframe (Wix), open in new tab
      if (window.parent !== window) {
        window.open(exploreUrl, '_blank');
      } else {
        window.location.href = exploreUrl;
      }
    }

    // ── Process invite acceptance ──
    async function processInviteAcceptance(token, sessionId, email) {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('invite-page').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('expired-page').classList.add('hidden');

      try {
        const result = await callAdvisor('acceptInvite', {
          data: { inviteToken: token, email: email }
        }, sessionId);

        if (result.success) {
          localStorage.removeItem('rs_pending_invite');
          // Store the sheet ID for the Storyteller to use
          if (result.sheetId) {
            localStorage.setItem('rs_sheet_id', result.sheetId);
          }
          // Redirect to the district
          const districtUrl = result.districtUrl
            ? `${STORYTELLER_BASE}${result.districtUrl}`
            : `${STORYTELLER_BASE}/storyteller?sheet=${result.sheetId}&role=resident`;
          window.location.href = districtUrl;
        } else {
          showError('Something went wrong accepting the invitation. Please try again.');
        }
      } catch (e) {
        console.error('Accept invite failed:', e);
        localStorage.removeItem('rs_pending_invite');
        showError(e.message || 'Unable to accept invitation. The link may have expired.');
      }
    }

    // ── Show error state ──
    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('invite-page').classList.add('hidden');
      document.getElementById('expired-page').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    // ── Wix postMessage param passthrough ──
    // When embedded in a Wix iframe, URL params don't reach this page.
    // The Wix Velo code sends them via postMessage instead.
    let _wixParamsReceived = false;

    window.addEventListener('message', function (event) {
      // Accept params from Wix parent (filesusr.com or readystack.ai)
      if (event.data && event.data.type === 'wixParams' && !_wixParamsReceived) {
        _wixParamsReceived = true;
        const p = event.data.params || {};

        // Build a fake search string from the Wix params
        const search = '?' + Object.entries(p).map(
          ([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)
        ).join('&');

        // Replace the URL so the rest of the code can read params normally
        window.history.replaceState({}, '', window.location.pathname + search);

        // Now run init with the params in place
        init();
      }
    });

    // Tell Wix parent we're ready to receive params
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'ready' }, '*');
    }

    // ── Run on load ──
    // If we already have a ?t= param (GitHub Pages direct access), run immediately.
    // If not, wait briefly for Wix postMessage. If nothing arrives, run anyway
    // (will show "invalid" error, which is correct for no-token visits).
    const _urlParams = new URLSearchParams(window.location.search);
    if (_urlParams.get('t') || _urlParams.get('rs_session')) {
      // Params already in URL — run now
      init();
    } else {
      // No params — wait for Wix postMessage, with a timeout fallback
      setTimeout(function () {
        if (!_wixParamsReceived) {
          init();  // No message came — run with whatever we have
        }
      }, 1500);
    }
  </script>
</body>
</html>
