    :root {
      --purple-header: linear-gradient(135deg, #2e1065 0%, #1e1b4b 100%);
      --accent: #7c8cff;
    }

    html {
      width: 100%;
      overflow-x: hidden;
    }
    body {
      background-color: #020617;
      margin: 0;
      padding: 0;
      width: 100%;
      color: #cbd5e1;
      font-family: 'Inter', sans-serif;
    }
    #root {
      width: 100%;
      display: block;
    }

    .rs-header {
        background: var(--purple-header);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        width: 100%;
        left: 0;
        right: 0;
        margin: 0;
        box-sizing: border-box;
        display: block;
    }

    .btn-login { 
        background: rgba(255,255,255,0.1); 
        border: 1px solid rgba(255,255,255,0.2); 
        transition: all 0.3s ease; 
        font-family: 'Poppins', sans-serif;
    }

    .btn-login:hover { 
        background: #fff; 
        color: #2e1065; 
        transform: translateY(-1px); 
        box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3); 
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .path-connector {
      fill: none;
      stroke-width: 1.5;
      opacity: 0.25;
      transition: all 0.3s ease;
    }

    .bead { filter: drop-shadow(0 0 4px #fff); }

    @keyframes data-flow {
      0% { offset-distance: 0%; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    .node-container { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .quadrant-label {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0.4em;
      opacity: 0.8; 
      pointer-events: none;
      text-transform: uppercase;
      font-size: 11px;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* === BRAND BUTTON SYSTEM (aligned with Wizard) === */
    .brand-glow-btn {
      color: white;
      border: 1px solid rgba(124, 140, 255, 0.25);
      font-weight: 800;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      animation: brand-glow-pulse 2s infinite;
      transition: all 0.2s ease-in-out;
    }
    .brand-glow-btn:hover {
      transform: translateY(-2px) scale(1.02);
      border-color: rgba(124, 140, 255, 0.6);
      animation-play-state: paused;
    }
    .brand-glow-btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }
    @keyframes brand-glow-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(124, 140, 255, 0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(124, 140, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(124, 140, 255, 0); }
    }
/* MARKER_99 */
  </style>
</head>

/* MARKER_200 */

          <path d="M12.5 21C13.3284 21 14 20.3284 14 19.5V4.5C14 3.67157 13.3284 3 12.5 3C11.6716 3 11 3.67157 11 4.5V19.5C11 20.3284 11.6716 21 12.5 21Z" fill="#F9AB00"/>
          <path d="M5.5 21C6.32843 21 7 20.3284 7 19.5V15.5C7 14.6716 6.32843 14 5.5 14C4.67157 14 4 14.6716 4 15.5V19.5C4 20.3284 4.67157 21 5.5 21Z" fill="#F9AB00"/>

    const SubstackIcon = ({ size = 14, className = "" }) => (

        <path d="M22.539 8.242H1.46V5.406h21.078v2.836zM1.46 10.812V24L12 18.11L22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.078V0z"/>

    const MediumIcon = ({ type, size = 14, className = "" }) => {
      const containerRef = useRef(null);
      const iconMap = {
        youtube: 'video', webinar: 'video', demo: 'video', activating: 'video',
        miro: 'layout-grid', diagram: 'layout-grid', logic: 'layout-grid',
        tour: 'mouse-pointer-2', trial: 'play-square', marketplace: 'shopping-bag',
        starting: 'copy', uploads: 'cloud-upload', api_config: 'zap', 
        commerce: 'shopping-cart', partner_checkout: 'shopping-cart',
        network_invite: 'share-2', share: 'share-2', affiliate: 'user-plus',
        deposits: 'circle-dollar-sign', revenue_share: 'banknote',
        success: 'users-round', onboarding: 'users-round',

        case_study: 'book-open', reviews_pricing: 'banknote', linkedin: 'linkedin'

      useEffect(() => {

      if (['observer', 'awareness', 'seed'].includes(type)) return <AngelIcon size={size} className={className} />;
      if (type === 'substack') return <SubstackIcon size={size} className={className} />;
      return <span ref={containerRef} className={`inline-flex items-center justify-center pointer-events-none ${className}`} style={{ width: size, height: size }} />;
    };

    const HoldingPowerChart = ({ datasets }) => (
      <div className="w-full h-full flex items-end gap-1 px-2 relative">
        {datasets[0].points.map((_, i) => (
          <div key={i} className="flex-1 flex flex-col items-center justify-end h-full group relative gap-0.5">
            {datasets.map((ds, dIdx) => (
              <div key={dIdx} className="w-full transition-all duration-300 rounded-t-sm" style={{ height: `${ds.points[i]}%`, backgroundColor: ds.color, opacity: ds.isBaseline ? 0.85 : 0.95 }} />
            ))}
            <div className="absolute bottom-full mb-3 opacity-0 group-hover:opacity-100 transition-all duration-200 pointer-events-none z-[100] translate-y-1 group-hover:translate-y-0">

                  </div>

            </div>
          </div>
        ))}

    const SignalHeatMap = ({ stages, mapping }) => {
      const hours = Array.from({ length: 12 }, (_, i) => `${i * 2}h`);
      const allRows = stages.flatMap(s => (mapping[s.id] || []).map(item => ({ ...item, stageColor: s.color })));
      return (
        <div className="w-full space-y-4">
          <div className="grid grid-cols-[160px_1fr] gap-4">
            <div />
            <div className="flex justify-between px-2">
              {hours.map(h => <span key={h} className="text-[8px] font-black text-slate-600 uppercase italic">{h}</span>)}
            </div>
          </div>
          <div className="space-y-1.5 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
            {allRows.map((row, ri) => (
              <div key={ri} className="grid grid-cols-[160px_1fr] gap-4 items-center group text-left">
                <div className="text-right truncate flex flex-col items-end">
                   <span className="text-[9px] font-black uppercase text-white truncate w-full">{row.ven || 'Partner'}</span>
                   <span className="text-[7px] font-bold uppercase opacity-40 italic" style={{ color: row.stageColor }}>{row.lab || 'Asset'}</span>
                </div>
                <div className="flex gap-1 h-6">
                  {Array.from({ length: 24 }).map((_, i) => {
                    const intensity = Math.max(0.05, (Math.sin((ri * 13) + i * 0.5) + 1) / 2 * 0.8);
                    const volume = Math.round(intensity * 1250);
                    return (
                      <div key={i} className="flex-1 rounded-sm shadow-inner relative group/heat" style={{ backgroundColor: row.stageColor, opacity: intensity }}>
                         <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 opacity-0 group-hover/heat:opacity-100 transition-all duration-200 pointer-events-none z-[100] translate-y-1 group-hover/heat:translate-y-0">
                           <div className="bg-slate-950/95 backdrop-blur-md border border-white/20 px-3 py-1.5 rounded-lg text-[9px] font-black text-white whitespace-nowrap shadow-2xl italic tracking-tight">
                              {volume.toLocaleString()} EVENTS
                           </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };
/* MARKER_209 */

    const stages = [
      { id: 'learning', label: 'LEARNING', color: '#ff2a1a' },
      { id: 'selecting', label: 'SELECTING', color: '#ffd666' },
      { id: 'executing', label: 'EXECUTING', color: '#48c9b0' },
      { id: 'expanding', label: 'EXPANDING', color: '#7c8cff' }
    ];

    const App = () => {


/* MARKER_210 */
      const CONTENT_BLACKLIST = [
        { terms: ["exposed","unbelievable","wait for it","you won't believe","crazy","insane"], reason: "Content does not meet quality standards." },
        { terms: ["prank","challenge","reaction","vlog","daily life","storytime","grwm"], reason: "Content does not meet standards of trust." },
        { terms: ["cringe","toxic","meme","gaming","let's play","moron","shitty"], reason: "Content is not aligned with core values." }
      ];

      const [isSyncing, setIsSyncing] = useState(false);
      const [activeTab, setActiveTab] = useState('youtube');
      const [introMode, setIntroMode] = useState('story-names'); 
      const [stackLabel, setStackLabel] = useState('ReadyStack Campaign');
      const [isEditingName, setIsEditingName] = useState(false);
      const [nameFlash, setNameFlash] = useState(false);
      const [ga4Id, setGa4Id] = useState('G-LUNAIR77');
      const [baseUrl, setBaseUrl] = useState('readystack.io/preview');
      const [hoveredNode, setHoveredNode] = useState(null);
      const [legendHover, setLegendHover] = useState(false);
      const [capitalLegendHover, setCapitalLegendHover] = useState(false);
      const [incomeLegendHover, setIncomeLegendHover] = useState(false);
      const [urlCopied, setUrlCopied] = useState(null);
      const [obsMode, setObsMode] = useState('live'); 
      const [snapshotPeriod, setSnapshotPeriod] = useState('1week');
      const [lookerPeriod, setLookerPeriod] = useState('30'); 
      const [isLiveData, setIsLiveData] = useState(false);
      const [isRailOpen, setIsRailOpen] = useState(true);
      
/* MARKER_211 */
      const [youtubeInput, setYoutubeInput] = useState('');
      const [youtubeEmbedUrl, setYoutubeEmbedUrl] = useState('');
      const [selectedVideoData, setSelectedVideoData] = useState(null);
      const [searchResults, setSearchResults] = useState([]);
      const [isSearching, setIsSearching] = useState(false);
      const [searchError, setSearchError] = useState(null);

      const [ytNextPageToken, setYtNextPageToken] = useState(null);
      const [visionResults, setVisionResults] = useState({});
      const [isSearchPanelOpen, setIsSearchPanelOpen] = useState(true);
      const [storyOutline, setStoryOutline] = useState(null);
      const [isGeneratingStory, setIsGeneratingStory] = useState(false);

/* MARKER_212 */
      const [videoStory, setVideoStory] = useState(null);
      const [playbackProgress, setPlaybackProgress] = useState(0);
      const [isNarrativePlaying, setIsNarrativePlaying] = useState(false);
      const narrativeInterval = useRef(null);

      const [storyParticipants, setStoryParticipants] = useState({ homies: ['', '', ''], besties: ['', '', ''], pursuits: ['', '', ''] });
      const [storyError, setStoryError] = useState(null);
      const [angelChoices, setAngelChoices] = useState({ observe: false, awareness: false, invest: false });
      const [angelAmounts, setAngelAmounts] = useState({ observe: 10000, awareness: 25000, invest: 100000 });
      const [residentAssignments, setResidentAssignments] = useState({});
      const [additionalWNTH, setAdditionalWNTH] = useState([]);
      const [showFinanceGate, setShowFinanceGate] = useState(false);
      const [financeAccepted, setFinanceAccepted] = useState(false);
      const [financeSplit, setFinanceSplit] = useState('default');
/* MARKER_213 */
      const [rsSession, setRsSession] = useState(null);       // { sessionId, email }
      const [rsSheetId, setRsSheetId] = useState(null);       // active district Sheet ID
      const [isSaving, setIsSaving] = useState(false);
      const [isOpening, setIsOpening] = useState(false);
      const [districtList, setDistrictList] = useState([]);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [draggedItem, setDraggedItem] = useState(null);
      const [deletingDistrictId, setDeletingDistrictId] = useState(null);

      const [mapping, setMapping] = useState({
        sources: [
          { ven: 'LinkedIn', lab: 'Organic Post', type: 'linkedin', ga4Count: 18420 },
          { ven: 'YouTube', lab: 'Strategy Video', type: 'youtube', ga4Count: 18420 }
        ],
        learning: [], selecting: [], executing: [], expanding: [], angels: []
      });

      const ytApiKey = "AIzaSyDCUc877CDBxRntQwctrKTFfjQ8rhPruss";
      const CLOUD_FUNCTION_URL = "https://us-central1-gen-lang-client-0769430147.cloudfunctions.net/advisor";

/* MARKER_214 */
      useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [activeTab]);

      useEffect(() => {
        if (stackLabel && stackLabel !== 'ReadyStack Campaign') {
          setNameFlash(true);
          const t = setTimeout(() => setNameFlash(false), 2000);
          return () => clearTimeout(t);
        }
      }, [stackLabel]);

      useEffect(() => {
        if (rsSession?.sessionId) {
          callAdvisor('listDistricts', {}, rsSession.sessionId)
            .then(res => {
              const districts = res.districts || [];
              setDistrictList(districts);
              // Auto-load: if we have a stored sheet ID, load it.
              // Otherwise load the most recently updated district.
              const storedSheet = localStorage.getItem('rs_sheet_id');
              const target = storedSheet && districts.find(d => d.sheetId === storedSheet)
                ? storedSheet
                : districts.length > 0
                  ? [...districts].sort((a, b) => (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || '')).shift()?.sheetId
                  : null;
              if (target && !rsSheetId && !restoredFromOAuthRef.current) {
                handleLoadDistrict(target);
              }
              restoredFromOAuthRef.current = false;
            })
            .catch(() => {});
        } else {
          setDistrictList([]);
        }
      }, [rsSession]);

/* MARKER_215 */
      useEffect(() => {
        const params    = new URLSearchParams(window.location.search);
        const sessionId = params.get('rs_session');
        const email     = params.get('rs_email');

        if (sessionId && email) {
          // Returning from Google OAuth persist and clean URL
          localStorage.setItem('rs_session', sessionId);
          localStorage.setItem('rs_email',   email);
          setRsSession({ sessionId, email });
          window.history.replaceState({}, '', window.location.pathname);

          // Restore app state that was persisted before OAuth redirect
          const savedState = localStorage.getItem('rs_app_state');
          if (savedState) {
            try {
              const snap = JSON.parse(savedState);
              if (snap.selectedVideoData) setSelectedVideoData(snap.selectedVideoData);
              if (snap.youtubeEmbedUrl) setYoutubeEmbedUrl(snap.youtubeEmbedUrl);
              if (snap.videoStory) setVideoStory(snap.videoStory);
              if (snap.stackLabel) setStackLabel(snap.stackLabel);
              if (snap.activeTab) setActiveTab(snap.activeTab);
              if (snap.isSearchPanelOpen === false) setIsSearchPanelOpen(false);
              if (snap.storyParticipants) setStoryParticipants(snap.storyParticipants);
              if (snap.mapping) setMapping(snap.mapping);
              restoredFromOAuthRef.current = true;
            } catch (e) {
              console.error('Failed to restore app state:', e);
            }
            localStorage.removeItem('rs_app_state');
          }
        } else {
          // Restore existing session from localStorage
          const storedSession = localStorage.getItem('rs_session');
          const storedEmail   = localStorage.getItem('rs_email');
          if (storedSession && storedEmail) {
            setRsSession({ sessionId: storedSession, email: storedEmail });
          }
          const storedSheetId = localStorage.getItem('rs_sheet_id');
          if (storedSheetId) setRsSheetId(storedSheetId);
        }
      }, []);

      const closeTimeoutRef = useRef(null);
      const restoredFromOAuthRef = useRef(false);

/* MARKER_216 */
      const fetchWithRetry = async (url, options = {}, retries = 5, backoff = 1000) => {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, backoff));
            return fetchWithRetry(url, options, retries - 1, backoff * 2);
          }
          throw error;
        }
      };

      // Generic POST to the advisor Cloud Function
/* MARKER_217 */
      const callAdvisor = async (task, data = {}, overrideSessionId = null) => {
        const sid  = overrideSessionId || rsSession?.sessionId;
        const body = { task, ...data, ...(sid ? { sessionId: sid } : {}) };
        const res  = await fetch(CLOUD_FUNCTION_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Request failed');
        return json;
      };

/* MARKER_218 */
      const persistAppState = () => {
        const snapshot = {};
        if (selectedVideoData) snapshot.selectedVideoData = selectedVideoData;
        if (youtubeEmbedUrl) snapshot.youtubeEmbedUrl = youtubeEmbedUrl;
        if (videoStory) snapshot.videoStory = videoStory;
        if (stackLabel && stackLabel !== 'ReadyStack Campaign') snapshot.stackLabel = stackLabel;
        if (activeTab !== 'youtube') snapshot.activeTab = activeTab;
        if (!isSearchPanelOpen) snapshot.isSearchPanelOpen = false;
        if (storyParticipants) snapshot.storyParticipants = storyParticipants;
        if (mapping) snapshot.mapping = mapping;
        if (Object.keys(snapshot).length > 0) {
          localStorage.setItem('rs_app_state', JSON.stringify(snapshot));
        }
      };

      // Start Google OAuth flow
/* MARKER_219 */
      const initiateGoogleAuth = async () => {
        persistAppState();
        const returnUrl   = window.location.href;
        const { authUrl } = await callAdvisor('initGoogleAuth', { data: { returnUrl } });
        window.top.location.href = authUrl;
      };

      // Handle LOGIN button click always triggers Google OAuth
      const handleLogin = async () => {
        await initiateGoogleAuth();
      };

      // Perform save
/* MARKER_220 */
      const triggerSave = async (overrideSessionId) => {
        setIsSaving(true);
        try {
          // ── Step 1: Check subscription status before saving ──
          // Skip the check if we're updating an existing district (has sheetId)
          if (!rsSheetId) {
            const subStatus = await callAdvisor('checkSubscription', {}, overrideSessionId);
            if (subStatus.limit && subStatus.districtCount >= subStatus.limit && !subStatus.subscribed) {
              // Free tier limit reached - redirect to Stripe checkout
              const returnUrl = window.top.location.href.split('?')[0];
              const { url } = await callAdvisor('createCheckoutSession', {
                data: { returnUrl }
              }, overrideSessionId);
              if (url) {
                window.top.location.href = url;
                return;
              }
            }
          }

          // ── Step 2: Proceed with save ──
          const result = await callAdvisor('saveDistrict', {
            data: {
              districtName : stackLabel || 'My District',
              mapping,
              sheetId      : rsSheetId || undefined,
              videoData    : selectedVideoData || null,
              youtubeEmbedUrl: youtubeEmbedUrl || '',
              videoStory   : videoStory || null
            }
          }, overrideSessionId);
          if (result.sheetId) {
            setRsSheetId(result.sheetId);
            localStorage.setItem('rs_sheet_id', result.sheetId);
            
            // Optimistically update district name in the rail
            setDistrictList(prev => {
              const existingIndex = prev.findIndex(d => d.sheetId === result.sheetId);
              const currentName = stackLabel || 'My District';
              if (existingIndex >= 0) {
                const updated = [...prev];
                updated[existingIndex] = { ...updated[existingIndex], name: currentName };
                return updated;
              } else {
                return [{ sheetId: result.sheetId, name: currentName }, ...prev];
              }
            });

            // Refresh district list in rail with overrideSessionId
            callAdvisor('listDistricts', {}, overrideSessionId).then(res => setDistrictList(res.districts || [])).catch(() => {});
          }
        } catch (e) {

                    <div className="flex items-center gap-6 text-left"><div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 shadow-inner">{[{ id: '30', label: '30 DAYS' }, { id: '90', label: '90 DAYS' }, { id: '365', label: 'ANNUAL' }].map(p => (<button key={p.id} onClick={() => setLookerPeriod(p.id)} className={`px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${lookerPeriod === p.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>{p.label}</button>))}</div></div>
                </div>
                <div className="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    {[ { lab: 'AWARENESS', val: (nodes.scaledTraffic || 0).toLocaleString(), sub: 'PREVIEW ENTRIES', color: 'border-white/5 bg-white/5 text-white', tip: 'Total nonlinear entries into the District' }, { lab: 'DWELL', val: (nodes.hangtimeVal || 0) + 'h', sub: 'ENGAGEMENT TIME', color: 'border-indigo-500/50 bg-indigo-500/10 text-indigo-300', tip: 'Aggregate dwell time across all resident nodes' }, { lab: 'AUTHORITY', val: (nodes.searchingVal || 0) + 'x', sub: 'SEARCH LIFT', color: 'border-white/5 bg-white/5 text-white', tip: 'Brand lift based on Dark GTM velocity' }, { lab: 'EST. INCOME', val: '$' + (Math.round((nodes.counts?.buying || 0) * 1200 / 12) || 0).toLocaleString(), sub: 'PROJECTED ARR', color: 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400', tip: 'Forecasted income from executing residents' }, { lab: 'COMMITMENT', val: (nodes.counts?.buying || 0).toLocaleString(), pct: (nodes.probs?.buying || 0) + '%', sub: 'ACTIVATION SIGNAL', color: 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400', tip: 'Successful resident copies and data uploads' }, { lab: 'TRUST', val: (nodes.counts?.sharing || 0).toLocaleString(), pct: (nodes.probs?.sharing || 0) + '%', sub: 'WORD OF MOUTH', color: 'border-indigo-500/50 bg-indigo-900/20 text-indigo-300', tip: 'Volume of shares and advocacy invitations' }, { lab: 'RETENTION', val: (nodes.counts?.retention || 0).toLocaleString(), pct: (nodes.probs?.retention || 0) + '%', sub: 'STABILITY INDEX', color: 'border-white/5 bg-white/5 text-white', tip: 'Ecosystem health and dividend payouts' } ].map((b, i) => (
                       <div key={i} className={`min-w-[185px] p-6 rounded-[24px] border shadow-2xl flex flex-col justify-between h-44 ${b.color} transition-all hover:border-white/20 group relative`}>
                          <div className="text-left"><p className="text-[9px] font-black uppercase tracking-widest mb-1 italic opacity-80">{b.lab}</p><div className="flex flex-col gap-0.5 mt-2"><div className="text-3xl font-black italic tracking-tighter leading-none">{b.val}</div>{b.pct && <div className="text-[12px] font-bold italic opacity-60 leading-none">{b.pct}</div>}</div></div>
                          <p className="text-[8px] uppercase font-black tracking-widest opacity-80">{b.sub}</p>
                          <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-950/95 backdrop-blur-xl rounded-[24px] flex items-center justify-center p-6 text-center border border-white/10 pointer-events-none z-50"><p className="text-[10px] font-black uppercase tracking-widest italic leading-relaxed text-indigo-300">{b.tip}</p></div>
                       </div>
                    ))}
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter">SIGNAL HEAT MAP</h4><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest">Density of ecosystem signals over a 24-hour baseline</p></div><div className="flex gap-4"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-slate-700"></div><span className="text-[8px] font-black uppercase text-slate-500">Low Density</span></div><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-500"></div><span className="text-[8px] font-black uppercase text-slate-500">High Density</span></div></div></div>
                   <SignalHeatMap stages={stages} mapping={mapping} />
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left"><div className="flex items-center gap-4"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter">YOUTUBE MOMENTUM</h4><span className="bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded text-[7px] font-black text-emerald-400 uppercase tracking-widest h-fit mt-1">Trust Verified</span></div><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest">ReadyStack Views vs. Total YouTube Views</p></div><div className="flex flex-col gap-4 text-[9px] font-black uppercase tracking-widest italic text-right"><div className="flex items-center justify-end gap-3 text-[#FF0000]"><div className="w-2 h-2 rounded-full bg-[#FF0000]"></div> TOTAL YOUTUBE VIEWS</div><div className="flex items-center justify-end gap-3 text-white"><div className="w-2 h-2 rounded-full bg-white"></div> READYSTACK VIEWS</div></div></div>
                   <div className="grid grid-cols-2 gap-12">{stages.map((s) => (<div key={s.id} className="space-y-4"><p className="text-[10px] font-black uppercase tracking-widest italic opacity-60" style={{ color: s.color }}>{s.label} Momentum</p><div className="h-40 flex items-end border-b border-white/5 pb-2"><HoldingPowerChart datasets={[{ color: '#FF0000', label: 'Total', points: [80, 85, 88, 86, 92, 95, 94, 90, 96, 98, 95, 110], isBaseline: true }, { color: '#ffffff', label: 'ReadyStack', points: [12, 32, 22, 48, 58, 55, 78, 72, 88, 92, 85, 102] }]} /></div></div>))}</div>
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left text-left"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter text-left">COMMERCE MOMENTUM</h4><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest text-left">Correlate Preview visits to Sharing activity and Sourcing probability</p></div><div className="flex flex-col gap-4 text-[9px] font-black uppercase tracking-widest italic text-right"><div className="flex items-center justify-end gap-3 text-white"><div className="w-2 h-2 rounded-full bg-white"></div> PREVIEW ENTRY</div><div className="flex items-center justify-end gap-3 text-[#48c9b0]"><div className="w-2 h-2 rounded-full bg-[#48c9b0]"></div> SHARING ACTIVITY</div><div className="flex items-center justify-end gap-3 text-[#7c8cff]"><div className="w-2 h-2 rounded-full bg-[#7c8cff]"></div> SOURCING DELTA</div></div></div>
                   <div className="h-96 flex items-end pt-8"><HoldingPowerChart datasets={[{ color: '#ffffff', label: 'Preview', points: [30, 45, 40, 55, 70, 65, 80, 75, 85, 90, 88, 95] }, { color: '#48c9b0', label: 'Sharing', points: [10, 15, 25, 20, 35, 45, 40, 50, 65, 60, 75, 70] }, { color: '#7c8cff', label: 'Sourcing', points: [5, 8, 12, 10, 18, 25, 22, 30, 45, 42, 55, 60] }]} /></div>
                </div>
              </div>
            )}
{/* MARKER_149 */}

{/* MARKER_150 */}
            {activeTab === 'g4' && (
              <div className="bg-white rounded-[40px] shadow-2xl overflow-hidden animate-fade-in text-left font-sans pt-16">
                <div className="bg-[#f8f9fa] border-b border-slate-200 px-10 py-6 flex justify-between items-center">
                  <div className="flex items-center gap-4"><i data-lucide="table" className="w-6 h-6 text-indigo-600"></i><h4 className="text-[#3c4043] font-bold text-lg tracking-tight leading-none uppercase italic">GA4 Registry Log</h4></div>
                  <GoogleAnalyticsIcon />
                </div>
                <div className="p-10">
                    <table className="w-full text-slate-800">
                        <thead><tr className="text-[11px] text-[#5f6368] uppercase font-black border-y border-slate-200"><th className="py-4 px-4 text-left">Event ID</th><th className="py-4 px-4 text-center">Medium</th><th className="py-4 px-4 text-right">Aggregate Count</th></tr></thead>
                        <tbody>{(nodes.items || []).filter(n => !n.isTrafficSource).map((n, i) => (
                            <tr key={i} className="border-b border-slate-100 text-[12px] text-[#3c4043] hover:bg-slate-50 transition-colors"><td className="py-6 px-4 font-mono font-bold italic tracking-tighter opacity-80 uppercase text-left">{n.vendor.toLowerCase()}_{n.label.toLowerCase().replace(/\s/g, '_')}</td><td className="py-6 px-4 text-center"><span className="px-4 py-1.5 bg-slate-100 rounded-full font-black text-[10px] uppercase italic text-slate-500 tracking-tighter">{n.type}</span></td><td className="py-6 px-4 text-right font-black text-indigo-600">{(n.ga4Count || 0).toLocaleString()}</td></tr>
                        ))}</tbody>
                    </table>
                </div>
              </div>
            )}

            </div>
{/* MARKER_199 */}


          </main>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
