  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f1f5f9;
    }

    .poppins {

    .header-gradient {
      background: linear-gradient(135deg, #0f172a, #020617);

    .card-bg {
      background-color: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);

    }

    .btn-primary {
      background: linear-gradient(135deg, #7c8cff, #a78bfa);

      border: none;

    .step-btn {

    .step-btn:hover {
      border-color: #7c8cff;
    }

    .progress-fill {
      background: linear-gradient(90deg, #7c8cff, #a78bfa);
      transition: width 0.3s ease;

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f1f5f9;
      border: 2px solid #7c8cff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(124, 140, 255, 0.3);
      transition: transform 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(124, 140, 255, 0.5);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f1f5f9;
      border: 2px solid #7c8cff;
      cursor: pointer;
    }

    .input-field {
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
      padding: 0.5rem 0.75rem;

    }

    .input-field:focus {
      outline: none;
      border-color: #7c8cff;
      box-shadow: 0 0 10px rgba(124, 140, 255, 0.2);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .resident-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c8cff, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .vertical-card {
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      background-color: rgba(15, 23, 42, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .vertical-card:hover {
      border-color: #7c8cff;
    }

    .vertical-card.active {
      background: linear-gradient(135deg, rgba(124, 140, 255, 0.2), rgba(167, 139, 250, 0.2));
      border-color: #7c8cff;
    }

    .left-border-callout {
      border-left: 4px solid #7c8cff;
      padding-left: 1rem;
      margin: 1rem 0;
    }

    .share-link-box {
      border: 2px solid #7c8cff;
      border-radius: 0.5rem;

      background-color: rgba(124, 140, 255, 0.1);
    }

    .stat-card {
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);

      padding: 1.5rem;

    .node-container { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .quadrant-label {

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">
    {/* ========== SECTION: ICONS ========== */}
    const { useState, useEffect, useRef, useMemo } = React;

    // Icon component for District Flow nodes — maps type to proper icon
    const MediumIcon = ({ type, size = 14, className = "" }) => {
      const containerRef = useRef(null);
      const iconMap = {
        youtube: 'video', video: 'video', demo: 'video',
        spotify: 'headphones', music: 'headphones', applemusic: 'headphones',
        soundcloud: 'cloud', bandcamp: 'disc-3',
        web: 'globe', website: 'globe', docs: 'file-text',
        merch: 'shopping-bag', checkout: 'shopping-cart', commerce: 'shopping-cart',
        signup: 'user-plus', social: 'share-2', case: 'book-open',
        meet: 'users-round',
        tiktok: 'clapperboard', instagram: 'camera', twitter: 'at-sign',
        discord: 'message-circle', email: 'mail',
        disco: 'radio', laylo: 'bell-ring',
        patreon: 'heart', kofi: 'coffee', tickets: 'ticket',
        observer: 'eye', awareness: 'megaphone', seed: 'sprout',
        node: 'circle', other: 'circle', gateway: 'circle'
      };
      const iconName = iconMap[type] || 'circle';
      useEffect(() => {
        if (containerRef.current && typeof lucide !== 'undefined' && !['youtube', 'spotify'].includes(type)) {
          containerRef.current.innerHTML = `<i data-lucide="${iconName}" style="width: ${size}px; height: ${size}px"></i>`;
          lucide.createIcons({ nameAttr: 'data-lucide' });
        }
      }, [type, iconName, size]);
      if (type === 'gateway') return <img src="https://static.wixstatic.com/media/5625d7_e043dfc9c6884a5d82484146f08c5b74~mv2.png" alt="Hub" style={{width: size, height: size}} className="rounded" />;
      if (type === 'youtube') return <svg viewBox="0 0 24 24" fill="currentColor" width={size} height={size} className={className}><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.546 12 3.546 12 3.546s-7.505 0-9.377.504A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.504 9.376.504 9.376.504s7.505 0 9.377-.504a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>;
      if (type === 'spotify') return <svg viewBox="0 0 24 24" fill="currentColor" width={size} height={size} className={className}><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.555-1.099.555a1.5 1.5 0 01-.726-.191c-3.294-1.986-7.404-2.428-12.258-1.33a1.406 1.406 0 01-1.674-1.065 1.413 1.413 0 011.065-1.674c5.517-1.246 10.239-.711 14.082 1.537.677.408.897 1.289.489 1.966l.121.202zm1.47-3.268c-.303.503-.855.795-1.418.795-.285 0-.57-.073-.83-.222-3.773-2.292-9.525-2.958-13.987-1.619a1.646 1.646 0 01-.958-3.149c5.1-1.53 11.43-.789 15.752 1.849.711.432.938 1.36.506 2.072l-.065.274zm.126-3.403C15.335 8.326 8.917 8.118 5.196 9.236a1.884 1.884 0 11-1.094-3.607c4.283-1.288 11.403-1.04 15.896 1.917a1.884 1.884 0 01-1.485 3.123z"/></svg>;
      if (['observer', 'awareness', 'seed'].includes(type)) return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width={size} height={size} className={className}><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>;
      return <span ref={containerRef} className={`inline-flex items-center justify-center pointer-events-none ${className}`} style={{ width: size, height: size }} />;
    };

    // Standalone icon shortcuts for use in UI
    const YouTubeIcon = () => <MediumIcon type="youtube" size={20} />;
    const SpotifyIcon = () => <MediumIcon type="spotify" size={20} />;

    {/* ========== SECTION: UTILITIES (callAdvisor, YouTube, etc) ========== */}
    // Cloud Function Call
    const callAdvisor = async (action, payload) => {
      const functionUrl = 'https://us-central1-gen-lang-client-0769430147.cloudfunctions.net/advisor';
      try {
        const response = await fetch(functionUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, payload, timestamp: Date.now() })
        });
        return await response.json();
      } catch (err) {
        console.error('Cloud function error:', err);
        return null;
      }
    };

    // YouTube Search
    const searchYouTube = async (query) => {
      const apiKey = 'AIzaSyDCUc877CDBxRntQwctrKTFfjQ8rhPruss';
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoCategoryId=10&maxResults=10&key=${apiKey}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        return data.items || [];
      } catch (err) {
        console.error('YouTube search error:', err);
        return [];
      }
    };

    // Extract Video ID from URL
    const extractVideoId = (url) => {
      if (!url) return null;
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      return match ? match[1] : null;
    };

    // Get Video Stats
    const getVideoStats = async (videoId) => {
      const apiKey = 'AIzaSyDCUc877CDBxRntQwctrKTFfjQ8rhPruss';
      const url = `https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${videoId}&key=${apiKey}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        return data.items?.[0] || null;
      } catch (err) {
        console.error('Video stats error:', err);
        return null;
      }
    };

    {/* ========== SECTION: CONSTANTS (stages) ========== */}
    // District Flow stages
    const stages = [
      { id: 'learning', label: 'DISCOVER', color: '#ff2a1a' },
      { id: 'selecting', label: 'ENGAGE', color: '#ffd666' },
      { id: 'executing', label: 'CONNECT', color: '#48c9b0' },
      { id: 'expanding', label: 'SUPPORT', color: '#7c8cff' }
    ];

    {/* ========== SECTION: APP COMPONENT ========== */}
    // Main App Component
    function MusicDistrictApp() {
      {/* ========== SECTION: STATE ========== */}
      // Step navigation
      const [activeStep, setActiveStep] = useState(0);
      const [stackLabel, setStackLabel] = useState('My Music District');
      const [isEditingName, setIsEditingName] = useState(false);
      const [editingNameValue, setEditingNameValue] = useState(stackLabel);
      // District Map — tracks which platform pill is expanded for URL editing (e.g. "0-t-1" = artist 0, traffic item 1)
      const [mapEditingItem, setMapEditingItem] = useState(null);

      // Platform & Search
      const [searchPlatform, setSearchPlatform] = useState('youtube');
      const [youtubeInput, setYoutubeInput] = useState('');
      const [youtubeEmbedUrl, setYoutubeEmbedUrl] = useState('');
      const [selectedVideoData, setSelectedVideoData] = useState(null);
      const [searchResults, setSearchResults] = useState([]);
      const [isSearching, setIsSearching] = useState(false);
      const [spotifyEmbedUrl, setSpotifyEmbedUrl] = useState('');

      // Residents
      const [storyParticipants, setStoryParticipants] = useState({
        residents: [
          {name:'Ava Monroe',email:'ava@example.com',phone:'555-0101',youtubeUrl:'https://youtube.com/@avamonroe',spotifyUrl:'https://open.spotify.com/artist/ava',districtUrl:'https://avamonroe.com',merchUrl:'https://shop.avamonroe.com',specialty:'',extraLinks:[{type:'instagram',url:'https://instagram.com/avamonroe'},{type:'bandcamp',url:'https://avamonroe.bandcamp.com'}],trafficSources:[{type:'tiktok',url:'https://tiktok.com/@avamonroe'},{type:'instagram',url:'https://instagram.com/avamonroe'}]},
          {name:'DJ Kato',email:'kato@example.com',phone:'555-0102',youtubeUrl:'https://youtube.com/@djkato',spotifyUrl:'https://open.spotify.com/artist/kato',districtUrl:'https://djkato.net',merchUrl:'https://djkato.net/merch',specialty:'',extraLinks:[{type:'soundcloud',url:'https://soundcloud.com/djkato'}],trafficSources:[{type:'youtube',url:'https://youtube.com/@djkato'}]},
          {name:'Luna Waves',email:'luna@example.com',phone:'555-0103',youtubeUrl:'https://youtube.com/@lunawaves',spotifyUrl:'https://open.spotify.com/artist/luna',districtUrl:'https://lunawaves.co',merchUrl:'',specialty:'',extraLinks:[],trafficSources:[]},
          {name:'',email:'',phone:'',youtubeUrl:'',spotifyUrl:'',districtUrl:'',merchUrl:'',specialty:'',extraLinks:[],trafficSources:[]},
          {name:'',email:'',phone:'',youtubeUrl:'',spotifyUrl:'',districtUrl:'',merchUrl:'',specialty:'',extraLinks:[],trafficSources:[]},
          {name:'',email:'',phone:'',youtubeUrl:'',spotifyUrl:'',districtUrl:'',merchUrl:'',specialty:'',extraLinks:[],trafficSources:[]}
        ]
      });

      // Partners — now with traffic sources + extra links like artists
      const [partners, setPartners] = useState([
        {name:'BeatCloud',company:'BeatCloud Inc.',email:'promo@beatcloud.io',phone:'555-0201',imageUrl:'',link:'',landingUrl:'https://beatcloud.io/artists',offerUrl:'https://beatcloud.io/pro',promoUrl:'https://beatcloud.io/share',trafficSources:[{type:'instagram',url:'https://instagram.com/beatcloud'}],extraLinks:[{type:'discord',url:'https://discord.gg/beatcloud'}]},
        {name:'Vinyl District',company:'VD Records',email:'info@vinyldistrict.com',phone:'555-0202',imageUrl:'',link:'',landingUrl:'https://vinyldistrict.com',offerUrl:'https://vinyldistrict.com/deals',promoUrl:'',trafficSources:[{type:'email',url:'newsletter@vinyldistrict.com'}],extraLinks:[]},
        {name:'',company:'',email:'',phone:'',imageUrl:'',link:'',landingUrl:'',offerUrl:'',promoUrl:'',trafficSources:[],extraLinks:[]},
        {name:'',company:'',email:'',phone:'',imageUrl:'',link:'',landingUrl:'',offerUrl:'',promoUrl:'',trafficSources:[],extraLinks:[]}
      ]);

      // Playlist
      const [playlistName, setPlaylistName] = useState('');
      const [playlistDesc, setPlaylistDesc] = useState('');
      const [playlistEmbedUrl, setPlaylistEmbedUrl] = useState('');

      const [rosterFilter, setRosterFilter] = useState('All');

      // Fan Verticals
      const [selectedVerticals, setSelectedVerticals] = useState([]);
      const verticalOptions = ['Trades', 'Freelancer', 'Creator', 'E-Commerce', 'Real Estate', 'Fitness', 'Sales', 'Other'];

      // Automation
      const [automations, setAutomations] = useState({
        districtOps: { welcome: true, newRelease: true, milestone: false, vip: false },
        fanTools: { onboarding: false, followUp: false, reEngagement: false, payments: false, survey: false }
      });
      const [autoTab, setAutoTab] = useState(0);

      // Mapping state for District Flow
      const [mapping, setMapping] = useState({
        sources: [],
        learning: [],
        selecting: [],
        executing: [],
        expanding: [],
        // NOTE: 'angels' key retained for backward compatibility with saved districts. Will rename to 'backers' in future migration.
        angels: []
      });

      // Backer-specific state
      const [backerChoices, setBackerChoices] = useState({ observe: false, awareness: false, invest: false });
      const [backerAmounts, setBackerAmounts] = useState({ observe: 10000, awareness: 25000, invest: 100000 });

      // District Flow UI state
      const [obsMode, setObsMode] = useState('live');
      const [snapshotPeriod, setSnapshotPeriod] = useState('1week');
      const [hoveredNode, setHoveredNode] = useState(null);
      const [playbackProgress, setPlaybackProgress] = useState(0);
      const [isNarrativePlaying, setIsNarrativePlaying] = useState(false);
      const narrativeInterval = useRef(null);
      // Artist Focus — null means "All Artists" (no focus), string = focused artist name
      const [selectedArtist, setSelectedArtist] = useState(null);
      // Layout mode — 'ecosystem' = chaotic scatter, 'relational' = organized columns by artist
      const [flowLayout, setFlowLayout] = useState('ecosystem');
      const [analyticsView, setAnalyticsView] = useState('traffic');
      const [trafficRange, setTrafficRange] = useState(30);

      // Share Settings
      const [shareSettings, setShareSettings] = useState({
        enableRewards: true, showDashboard: true, enableLeaderboard: true
      });
      const [fanCount, setFanCount] = useState(1000);
      const [calcActivation, setCalcActivation] = useState(2);     // % of fans who use automation
      const [calcSharing, setCalcSharing] = useState(15);           // % of activated fans who share
      const [calcTriggers, setCalcTriggers] = useState(20);         // base automations/month
      const [vibeStatus, setVibeStatus] = useState('idle');

      // Persistence
      const [rsSession, setRsSession] = useState(null);
      const [rsSheetId, setRsSheetId] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const [districtList, setDistrictList] = useState([]);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [isRailOpen, setIsRailOpen] = useState(true);
      const [userEmail, setUserEmail] = useState('');

      {/* ========== SECTION: HANDLERS ========== */}
      // Calculate revenue
      const calculateRevenue = (fans) => {
        const conversionRate = 0.01;
        const activeUsers = Math.round(fans * conversionRate);
        const triggersPerUser = 200;
        const totalTriggers = activeUsers * triggersPerUser;

        let cost = 0;
        if (totalTriggers <= 2500) cost = 0;
        else if (totalTriggers <= 10000) cost = (totalTriggers - 2500) * 0.012;
        else if (totalTriggers <= 50000) cost = (7500 * 0.012) + (totalTriggers - 10000) * 0.008;
        else cost = (7500 * 0.012) + (40000 * 0.008) + (totalTriggers - 50000) * 0.004;

        return {
          totalHAF: cost,
          artistEarnings: cost * 0.20,
          distributorEarnings: cost * 0.40,
          readystackEarnings: cost * 0.40,
          activeUsers,
          totalTriggers
        };
      };

      const revenueStats = calculateRevenue(fanCount);

      // Backer CRUD functions
      const handlePatternUpdate = (stageId, idx, key, val) => {
        setMapping(prev => {
          const next = [...(prev[stageId] || [])];
          if (next[idx]) next[idx] = {...next[idx], [key]: val};
          return { ...prev, [stageId]: next };
        });
      };

      const addPattern = (stageId) => {
        setMapping(prev => {
          if (stageId === 'angels') {
            return { ...prev, angels: [...(prev.angels || []), { lab: 'Backer', platform: 'observer', amount: 50000, startups: [], isManual: true }] };
          }
          return { ...prev, [stageId]: [...(prev[stageId] || []), { ven: 'Partner A', platform: 'youtube', ga4Count: 1200, isManual: true }] };
        });
      };

      const removePattern = (stageId, idx) => {
        setMapping(prev => ({ ...prev, [stageId]: (prev[stageId] || []).filter((_, i) => i !== idx) }));
      };

      const movePattern = (stageId, idx, dir) => {
        setMapping(prev => {
          const next = [...(prev[stageId] || [])];
          const target = idx + dir;
          if (target < 0 || target >= next.length) return prev;
          [next[idx], next[target]] = [next[target], next[idx]];
          return { ...prev, [stageId]: next };
        });
      };

      const updateScoutStartup = (idx, sIdx, val) => {
        setMapping(prev => {
          const next = [...(prev.angels || [])];
          const newStartups = [...(next[idx].startups || [])];
          newStartups[sIdx] = val;
          next[idx] = {...next[idx], startups: newStartups};
          return { ...prev, angels: next };
        });
      };

      const addStartupToScout = (idx) => {
        setMapping(prev => {
          const next = [...(prev.angels || [])];
          const defaultStartup = (prev.learning && prev.learning.length > 0) ? prev.learning[0].ven : 'Partner A';
          next[idx] = {...next[idx], startups: [...(next[idx].startups || []), defaultStartup]};
          return { ...prev, angels: next };
        });
      };

      const removeStartupFromScout = (idx, sIdx) => {
        setMapping(prev => {
          const next = [...(prev.angels || [])];
          next[idx] = {...next[idx], startups: next[idx].startups.filter((_, i) => i !== sIdx)};
          return { ...prev, angels: next };
        });
      };

      // Build story district from residents
      const buildStoryDistrict = () => {
        const allResidents = storyParticipants.residents.filter(r => r.name);
        const nextMapping = {
          sources: [],
          learning: [],
          selecting: [],
          executing: [],
          expanding: [],
          angels: mapping.angels || []
        };

          allArtistNames.forEach(artistName => {
            for (let s = 0; s < stageOrder.length - 1; s++) {
              const fromNodes = items.filter(n => n.vendor === artistName && n.stageId === stageOrder[s]);
              const toNodes = items.filter(n => n.vendor === artistName && n.stageId === stageOrder[s + 1]);
              if (fromNodes.length && toNodes.length) {
                // Connect last node in source stage to first in destination stage
                allFlows.push({
                  from: fromNodes[fromNodes.length - 1], to: toNodes[0],
                  speed: 5 + s, color: stageColorMap[stageOrder[s + 1]], strokeWidth: 1.8
                });
              }
            }
          });

          // Cross-artist flows at same stage — the key relational insight
          // Show where artist A's Discover content links to artist B's Engage, etc.
          stageOrder.forEach((stageId, si) => {
            const nextStage = stageOrder[si + 1];
            if (!nextStage) return;
            // For each artist, connect their stage node to the next artist's next-stage node
            for (let a = 0; a < allArtistNames.length - 1; a++) {
              const fromArtist = allArtistNames[a];
              const toArtist = allArtistNames[(a + 1) % (allArtistNames.length - 1)]; // skip ReadyStack
              if (fromArtist === 'ReadyStack' || toArtist === 'ReadyStack') continue;
              const fromNode = items.find(n => n.vendor === fromArtist && n.stageId === stageId && !n.internal);
              const toNode = items.find(n => n.vendor === toArtist && n.stageId === nextStage && !n.internal);
              if (fromNode && toNode) {
                allFlows.push({
                  from: fromNode, to: toNode,
                  speed: 8, color: '#c084fc', strokeWidth: 1.2, isCrossArtist: true
                });
              }
            }
          });

          // Column headers (stored as metadata, rendered in JSX)
          const columnHeaders = allArtistNames.map((name, i) => ({
            name, x: leftPad + (i * colWidth) + (colWidth / 2), y: 60
          }));

          // Row labels
          const rowLabels = stages.map(s => ({
            label: s.label, color: s.color, y: stageY[s.id]
          }));

          const scaledTraffic = mapping.sources?.reduce((acc, s) => acc + (s.ga4Count || 18420), 0) || 0;

          return { items, flows: allFlows, gravityLines: [], scaledTraffic, flowIntensity, columnHeaders, rowLabels, isRelational: true };
        }

        // ====== ECOSYSTEM VIEW LAYOUT (original) ======
        // Hub / Gateway node — the ReadyStack fox
        const entryNode = {
          id: 'ready-hub', label: 'ReadyStack Hub', vendor: 'ReadyStack',
          type: 'gateway', color: '#ffffff',
          x: centerX, y: 320, radius: 34, isSystem: true, ga4Count: 5200
        };
        items.push(entryNode);

        // Traffic Sources — grouped by artist/partner across the top
        const sourcesByVendor = {};
        (mapping.sources || []).forEach((s, idx) => {
          const ven = s.ven || 'Unknown';
          if (!sourcesByVendor[ven]) sourcesByVendor[ven] = [];
          sourcesByVendor[ven].push({ ...s, origIdx: idx });
        });
        const vendorGroups = Object.keys(sourcesByVendor);
        const totalSourceWidth = 900;
        const sourceStartX = centerX - totalSourceWidth / 2;
        const groupGap = 40;
        const totalNodes = (mapping.sources || []).length;
        const nodeSpacing = totalNodes > 0 ? Math.min(65, (totalSourceWidth - groupGap * (vendorGroups.length - 1)) / totalNodes) : 65;
        let srcCursor = sourceStartX;
        vendorGroups.forEach((ven, gi) => {
          const group = sourcesByVendor[ven];
          group.forEach((s, si) => {
            items.push({
              id: `source-${s.origIdx}`, label: s.lab, vendor: s.ven,
              isTrafficSource: true, type: s.type || 'web',
              color: '#ffffff', x: srcCursor, y: 160, radius: 26,
              ga4Count: (s.ga4Count || 18420) * timeMultiplier,
              vendorGroup: ven
            });
            srcCursor += nodeSpacing;
          });
          if (gi < vendorGroups.length - 1) srcCursor += groupGap;
        });

        // Backers — rendered as small badge row across top (not random floating nodes)
        const activeBckrsForFlow = (mapping.angels || []).filter(b => b.lab && b.visible !== false);
        if (activeBckrsForFlow.length > 0) {
          const backerStartX = centerX - (activeBckrsForFlow.length * 55) / 2;
          activeBckrsForFlow.forEach((a, idx) => {
            const typeInfo = BACKER_TYPES.find(t => t.value === a.type) || BACKER_TYPES[0];
            items.push({
              id: `angel-${idx}`, label: a.lab || typeInfo.label, vendor: a.lab || 'Backer',
              type: a.type || 'sponsor',
              color: typeInfo.color,
              x: backerStartX + (idx * 55), y: 55,
              radius: 18, isSystem: true, isAngel: true, isBacker: true,
              investorClass: a.type, startups: a.startups || [],
              amount: a.amount || 0
            });
          });
        }

        // Quadrant bounds
        const quadBounds = {
          learning:  { xMin: 60,  xMax: 540,  yMin: 440, yMax: 760,  color: '#ff2a1a' },
          selecting: { xMin: 660, xMax: 1140, yMin: 440, yMax: 760,  color: '#ffd666' },
          executing: { xMin: 60,  xMax: 540,  yMin: 820, yMax: 1240, color: '#48c9b0' },
          expanding: { xMin: 660, xMax: 1140, yMin: 820, yMax: 1240, color: '#7c8cff' }
        };

        // Grouped grid layout — nodes organized by artist/partner within each quadrant
        stages.forEach((stage) => {
          const stageItems = mapping[stage.id] || [];
          const bounds = quadBounds[stage.id];
          const pad = 30;
          const usableW = bounds.xMax - bounds.xMin - pad * 2;
          const usableH = bounds.yMax - bounds.yMin - pad * 2;

          // Group items by vendor (artist name)
          const byVendor = {};
          stageItems.forEach((p, idx) => {
            const ven = p.ven || 'Partner';
            if (!byVendor[ven]) byVendor[ven] = [];
            byVendor[ven].push({ ...p, origIdx: idx });
          });
          // Sort: named artists first (alphabetical), ReadyStack/system last
          const vendorKeys = Object.keys(byVendor).sort((a, b) => {
            if (a === 'ReadyStack') return 1;
            if (b === 'ReadyStack') return -1;
            return a.localeCompare(b);
          });

          const numVendors = vendorKeys.length || 1;
          // Each vendor gets a horizontal band within the quadrant
          const bandHeight = usableH / numVendors;

          vendorKeys.forEach((ven, vi) => {
            const group = byVendor[ven];
            const bandY = bounds.yMin + pad + vi * bandHeight;
            const bandCenterY = bandY + bandHeight / 2;
            const nodeGap = Math.min(70, usableW / (group.length + 1));

            group.forEach((p, ni) => {
              const nodeId = `${stage.id}-${p.origIdx}`;
              const isRS = p.dedicated || p.internal;
              const baseRadius = isRS ? 20 : 24;
              const scaledRadius = baseRadius * (1 + (narrativeScale - 1) * 0.5);
              const driftY = (stage.id === 'executing' || stage.id === 'expanding') ? -driftFactor : driftFactor;

              // Spread nodes evenly across the band width
              const x = bounds.xMin + pad + nodeGap * (ni + 1);
              const y = bandCenterY + driftY;

              items.push({
                id: nodeId, label: p.lab || p.platform, vendor: ven,
                stageId: stage.id, type: p.platform || 'node', color: bounds.color,
                internal: !!p.internal, url: p.pat || '',
                x: Math.max(bounds.xMin + pad, Math.min(bounds.xMax - pad, x)),
                y: Math.max(bounds.yMin + pad, Math.min(bounds.yMax - pad, y)),
                radius: scaledRadius,
                isSystem: true, ga4Count: (p.ga4Count || 1000) * timeMultiplier,
                vendorGroup: ven
              });
            });
          });
        });

        // Build ecosystem flows
        const allFlows = [];
        const entryFlows = items.filter(n => n.isTrafficSource).map(source => ({
          from: source, to: entryNode, speed: 7, color: '#ffffff', strokeWidth: 1.5
        }));
        allFlows.push(...entryFlows);
        const lNodes = items.filter(n => n.stageId === 'learning');
        const sNodes = items.filter(n => n.stageId === 'selecting');
        const eNodes = items.filter(n => n.stageId === 'executing');
        const xNodes = items.filter(n => n.stageId === 'expanding');
        lNodes.forEach((n, i) => allFlows.push({ from: entryNode, to: n, speed: 4 + (i % 3), color: '#ff2a1a', strokeWidth: 1.2 }));
        sNodes.forEach((n, i) => allFlows.push({ from: entryNode, to: n, speed: 4.5 + (i % 3), color: '#ffd666', strokeWidth: 1.2 }));
        lNodes.forEach((n, i) => { if (eNodes.length) allFlows.push({ from: n, to: eNodes[i % eNodes.length], speed: 5, color: '#48c9b0', strokeWidth: 1.2 }); });
        sNodes.forEach((n, i) => { if (eNodes.length) allFlows.push({ from: n, to: eNodes[(i + 1) % eNodes.length], speed: 5, color: '#48c9b0', strokeWidth: 1.2 }); });
        eNodes.forEach((n, i) => { if (xNodes.length) allFlows.push({ from: n, to: xNodes[i % xNodes.length], speed: 6, color: '#7c8cff', strokeWidth: 1.5 }); });
        items.filter(n => n.isAngel).forEach(n => {
          if (n.investorClass === 'awareness') {
            items.filter(t => t.isTrafficSource).forEach(t => {
              allFlows.push({ from: n, to: t, speed: 8, color: n.color, strokeWidth: 2, isFunding: true });
            });
          } else if (n.investorClass === 'seed') {
            if (n.startups && n.startups.length > 0) {
              n.startups.forEach(startupName => {
                const targetNode = items.find(i => i.vendor === startupName && i.stageId === 'learning') || items.find(i => i.vendor === startupName && !i.isTrafficSource && !i.isAngel);
                if (targetNode) allFlows.push({ from: n, to: targetNode, speed: 8, color: n.color, strokeWidth: 2, isFunding: true });
              });
            }
          }
        });

        const scaledTraffic = mapping.sources?.reduce((acc, s) => acc + (s.ga4Count || 18420), 0) || 0;

        // Gravity lines (ecosystem view only)
        const gravityLines = [];
        if (selectedArtist) {
          const artistNodes = items.filter(n => n.vendor === selectedArtist && n.stageId && !n.isAngel);
          const otherArtistNodes = items.filter(n => n.vendor !== selectedArtist && n.vendor !== 'ReadyStack' && n.stageId && !n.isAngel);
          const stageOrder = ['learning', 'selecting', 'executing', 'expanding'];
          const candidates = [];
          artistNodes.forEach(aNode => {
            const aIdx = stageOrder.indexOf(aNode.stageId);
            otherArtistNodes.forEach(oNode => {
              const oIdx = stageOrder.indexOf(oNode.stageId);
              if (oIdx >= aIdx && oIdx <= aIdx + 1) {
                let str = 0;
                const combined = aNode.id + oNode.id;
                for (let i = 0; i < combined.length; i++) str = (str * 31 + combined.charCodeAt(i)) & 0xfff;
                const strength = (str % 100) / 100;
                if (strength > 0.4) {
                  candidates.push({ from: aNode, to: oNode, speed: 12 + (str % 4), color: '#c084fc', strokeWidth: 1.2 + strength * 1.2, isGravity: true, strength });
                }
              }
            });
          });
          candidates.sort((a, b) => b.strength - a.strength);
          gravityLines.push(...candidates.slice(0, 4));
        }

        return { items, flows: allFlows, gravityLines, scaledTraffic, flowIntensity, isRelational: false };
      }, [mapping, obsMode, playbackProgress, selectedArtist, flowLayout]);

      // Progress percentage
      const progressPercent = Math.round(((activeStep + 1) / 7) * 100);

      return (
        <div className="flex flex-col h-screen bg-slate-950">
          {/* ========== SECTION: RENDER - HEADER ========== */}
          {/* Header */}
          <header className="header-gradient sticky top-0 z-50">
            <div className="flex items-center justify-between px-6 py-3 border-b border-white/10">
              <a href="https://www.readystack.ai" target="_top" className="flex items-center gap-3 no-underline" style={{textDecoration:'none'}}>
                <img src="https://static.wixstatic.com/media/5625d7_e043dfc9c6884a5d82484146f08c5b74~mv2.png" alt="ReadyStack" className="h-8 w-auto" />
                <div className="flex flex-col">
                  <span className="poppins font-bold text-lg text-white">ReadyStack</span>
                  <span className="text-xs text-indigo-500">Music District</span>
                </div>
              </a>

              <div className="flex items-center gap-4">
                {isSaving && (
                  <span className="text-xs text-indigo-500 animate-pulse">Saving...</span>
                )}
                <button
                  className="btn-primary"
                  onClick={triggerSave}
                  disabled={isSaving}
                >
                  Save
                </button>

                <div className="relative">
                  <button
                    onClick={() => setShowUserMenu(!showUserMenu)}
                    className="text-indigo-500 hover:text-indigo-400"
                  >
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                  </button>
                  {showUserMenu && (
                    <div className="absolute right-0 mt-2 w-48 card-bg p-4 shadow-lg">
                      <p className="text-sm text-slate-300">{userEmail || 'Not logged in'}</p>
                      <button className="text-indigo-500 text-sm mt-2 hover:text-indigo-400">Sign In with Google</button>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* District Name Bar */}
            <div className="px-6 py-2 flex items-center gap-2 bg-slate-900/50">
              {isEditingName ? (
                <input
                  type="text"
                  value={editingNameValue}
                  onChange={(e) => setEditingNameValue(e.target.value)}
                  onBlur={() => {
                    setStackLabel(editingNameValue);
                    setIsEditingName(false);
                  }}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                      setStackLabel(editingNameValue);
                      setIsEditingName(false);
                    }
                  }}
                  className="input-field text-sm flex-1 max-w-xs"
                  autoFocus
                />
              ) : (
                <h2
                  className="poppins font-bold text-white cursor-pointer hover:text-indigo-400"
                  onClick={() => setIsEditingName(true)}
                >
                  {stackLabel}
                </h2>
              )}
              <span className="text-xs badge bg-indigo-500/20 text-indigo-300">Music District</span>
            </div>
          </header>

          {/* Main Content Area */}
          <div className="flex flex-1 overflow-hidden">
            {/* ========== SECTION: RENDER - LEFT RAIL ========== */}
            {/* Left Rail */}
            <div className={`${isRailOpen ? 'w-64' : 'w-0'} transition-all duration-300 border-r border-white/10 overflow-y-auto bg-slate-900/50`}>
              {isRailOpen && (
                <div className="p-4">
                  {/* My Districts */}
                  <div className="mb-6">
                    <h3 className="poppins font-semibold text-sm text-slate-300 mb-3">My Districts</h3>
                    <button className="btn-primary w-full text-sm">+ New District</button>
                    {districtList.length > 0 && (
                      <div className="mt-2 space-y-2">
                        {districtList.map((d, i) => (
                          <div key={i} className="text-xs text-slate-400 p-2 card-bg rounded cursor-pointer hover:border-indigo-500">
                            {d.name}
                          </div>

                      </div>

                  </div>

                  {/* Progress Bar */}
                  <div className="mb-6">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-xs font-semibold text-slate-300">Progress</span>
                      <span className="text-xs text-indigo-500">{progressPercent}%</span>
                    </div>
                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                      <div className="progress-fill h-full" style={{width: `${progressPercent}%`}}></div>
                    </div>
                  </div>

                  {/* Step Buttons */}
                  <div className="space-y-2">
                    {[
                      'Featured Music',
                      'Collective',
                      'Links',
                      'Backers',
                      'District Flow',
                      'Analytics',
                      'Preview'
                    ].map((label, idx) => (
                      <button
                        key={idx}
                        onClick={() => setActiveStep(idx)}

                        <span className="font-semibold">{idx + 1}.</span> {label}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Toggle Rail Button */}
            <button
              onClick={() => setIsRailOpen(!isRailOpen)}
              className="w-6 border-r border-white/10 hover:bg-slate-800 flex items-center justify-center text-indigo-500"
            >
              {isRailOpen ? '‹' : '›'}
            </button>

            {/* Content Area */}
            <div className="flex-1 overflow-y-auto p-8">
              {/* ========== SECTION: RENDER - TAB 0: FEATURED MUSIC ========== */}
              {/* TAB 0: Featured Music */}
              {activeStep === 0 && (
                <div className="space-y-6">
                  <h1 className="poppins font-bold text-3xl text-white">Featured Music</h1>

                  <div className="grid grid-cols-5 gap-8">
                    {/* LEFT COLUMN (col-span-3) */}
                    <div className="col-span-3 space-y-6">
                      {/* Explanatory Text */}
                      <div className="card-bg p-6 border border-slate-800/60">
                        <p className="text-sm text-slate-400">Upload your featured video to generate the vibe. We'll analyze the lyrics, mood, and audience demographics to match you with the right sponsors.</p>
                      </div>

                      {/* Platform Selector */}
                      <div className="flex gap-3">
                        <button
                          onClick={() => setSearchPlatform('youtube')}
                          className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all ${
                            searchPlatform === 'youtube'
                              ? 'bg-red-600 text-white'
                              : 'card-bg text-slate-300 hover:border-red-500'
                          }`}
                        >
                          <YouTubeIcon /> YouTube
                        </button>
                        <button

                          className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all ${
                            searchPlatform === 'spotify'

                      {/* YouTube Section */}
                      {searchPlatform === 'youtube' && (
                        <div className="space-y-4">

                            <div className="space-y-4">

                                {selectedVideoData && (
                                  <div className="mt-4">

                                <div className="mt-4">

                        </div>

                        {vibeStatus === 'idle' ? (

                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        let d;
                        if (nodes.isRelational) {
                          // Relational: gentle S-curve for readability (not wild beziers)
                          const midY = (flow.from.y + flow.to.y) / 2;

                        const dy = grav.to.y - grav.from.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const offset = dist * 0.25;
                        const cpX = midX - (dy / dist) * offset;
                        const cpY = midY + (dx / dist) * offset;
                        const d = `M ${grav.from.x},${grav.from.y} Q ${cpX},${cpY} ${grav.to.x},${grav.to.y}`;
                        return (

                  {analyticsView === 'traffic' && (() => {
                    const allArtists = storyParticipants.residents.filter(r => (r.name || '').trim());
                    const allPartners = partners.filter(p => (p.name || '').trim());
                    const districtFans = fanCount || 5000;
                    const activeArtists = allArtists.length || 1;

                    // ── Build contributor traffic data (artists + partners ARE the traffic) ──
                    const contributors = [];

                    const partnerColors = ['#f97316', '#fb923c', '#fdba74', '#ea580c'];
                    allArtists.forEach((a, i) => {

                      const touchpoints = srcCount + linkCount + (a.youtubeUrl ? 1 : 0) + (a.spotifyUrl ? 1 : 0);
                      // Mock: more touchpoints = more clicks. Seed with deterministic pseudo-random
                      const baseFans = Math.round(districtFans / activeArtists);
                      const clickRate = 0.03 + (touchpoints * 0.008); // 3% base + 0.8% per touchpoint
                      const monthlyClicks = Math.round(baseFans * clickRate);
                      const purchaseClickRate = 0.12 + (linkCount * 0.02); // 12% of clicks hit purchase pages
                      const purchaseClicks = Math.round(monthlyClicks * purchaseClickRate);
                      const estRevenue = purchaseClicks * 2.50; // avg $2.50 per purchase-page visit (merch, streams, tips)
                      contributors.push({
                        name: a.name, kind: 'artist', color: artistColors[i % artistColors.length],

                        sources: (a.trafficSources || []).filter(s => s.url).map(s => {

                      const touchpoints = srcCount + linkCount;
                      const partnerReach = Math.round(districtFans * 0.3); // partners reach ~30% of district
                      const clickRate = 0.04 + (touchpoints * 0.01);
                      const monthlyClicks = Math.round(partnerReach * clickRate);

                      const purchaseClicks = Math.round(monthlyClicks * purchaseClickRate);
                      const estRevenue = purchaseClicks * 3.20; // partner offers convert higher
                      contributors.push({
                        name: p.name, kind: 'partner', color: partnerColors[i % partnerColors.length],

                    contributors.sort((a, b) => b.monthlyClicks - a.monthlyClicks);
                    const totalClicks = contributors.reduce((s, c) => s + c.monthlyClicks, 0);
                    const totalPurchaseClicks = contributors.reduce((s, c) => s + c.purchaseClicks, 0);
                    const totalEstRevenue = contributors.reduce((s, c) => s + c.estRevenue, 0);
                    const revPerFan = districtFans > 0 ? (totalEstRevenue / districtFans) : 0;

                    // ── 30-day simulated chart data per contributor ──
                    const seed = (n) => ((n * 9301 + 49297) % 233280) / 233280; // deterministic pseudo-random
                    const dailyData = [];
                    for (let d = 0; d < 30; d++) {
                      const day = { day: d + 1, total: 0 };
                      const weekendDip = (d % 7 === 5 || d % 7 === 6) ? 0.65 : 1;
                      const growthTrend = 1 + (d / 30) * 0.2;

                      dailyData.push(day);

                    const yTicks = [];

                  {/* ════════ VIEW: THE GOUVEIA CHART ════════ */}
                  {analyticsView === 'gouveia' && (() => {

                                <p className="text-[10px] text-slate-500"><span className="text-slate-300 font-medium">Compounding triggers.</span> More fans means more automations fire. ReadyStack's trigger pricing rewards volume — your cost per trigger drops as the collective grows.</p>
                              </div>

                                <span className="text-indigo-400 text-[10px] mt-0.5 shrink-0">3.</span>
                                <p className="text-[10px] text-slate-500"><span className="text-slate-300 font-medium">Revenue earlier.</span> {activeArtists > 1 ? `Instead of ${activeArtists} artists each struggling toward 10K alone, the collective reaches the Gouveia Line together — and everyone earns.` : 'Adding more artists multiplies the effect.'}</p>

                        </div>
                      </div>

                        return (
                          <div key={q.key} className={`rounded-2xl p-6 text-center transition-all border ${hasLinks ? 'cursor-pointer hover:scale-105 border-white/10' : 'opacity-40 border-white/5'}`}
                            style={{ backgroundColor: hasLinks ? q.color + '10' : 'transparent' }}
                            onClick={() => { if (hasLinks && firstLink.url) window.open(firstLink.url.startsWith('http') ? firstLink.url : 'https://' + firstLink.url, '_blank'); }}
                          >
                            <div className="w-14 h-14 rounded-xl mx-auto mb-3 flex items-center justify-center" style={{ backgroundColor: q.color + '20' }}>
                              <i data-lucide={q.icon} className="w-7 h-7" style={{ color: q.color }}></i>
                            </div>
                            <h3 className="poppins font-bold text-white text-lg mb-1">{q.label}</h3>
                            <p className="text-sm" style={{ color: hasLinks ? q.color : '#475569' }}>
                              {hasLinks ? `${q.sub} — ${q.links.length} link${q.links.length > 1 ? 's' : ''}` : `No ${q.sub.toLowerCase()} links yet`}
                            </p>
                            {hasLinks && q.links.length > 1 && (
                              <div className="mt-3 space-y-1">
                                {q.links.slice(0, 3).map((l, li) => (
                                  <p key={li} className="text-xs text-slate-400 truncate">{l.name}</p>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* ===== 4. FEATURED CONTENT — Video + Spotify ===== */}
                  {(hasVideo || hasSpotify) && (
                    <div className="mb-10">
                      <h2 className="poppins font-bold text-2xl text-white mb-6">Featured</h2>
                      <div className={`grid ${hasVideo && hasSpotify ? 'md:grid-cols-2' : 'grid-cols-1'} gap-6`}>
                        {hasVideo && (
                          <div className="card-bg p-4 rounded-2xl overflow-hidden">
                            <div className="relative w-full rounded-xl overflow-hidden" style={{paddingBottom: '56.25%'}}>
                              <iframe src={youtubeEmbedUrl} className="absolute top-0 left-0 w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                            </div>
                          </div>
                        )}
                        {hasSpotify && (
                          <div className="card-bg p-4 rounded-2xl">
                            <iframe src={spotifyEmbedUrl} width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" className="rounded-xl"></iframe>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* ===== 5. THE COLLECTIVE — Artists + Partners ===== */}
                  <div className="mb-10">
                    <h2 className="poppins font-bold text-2xl text-white mb-6">The Collective</h2>
                    {/* Artists */}
                    {storyParticipants.residents.filter(r => r.name).length > 0 && (
                      <div className="mb-6">
                        <p className="text-sm text-slate-500 uppercase tracking-wider mb-4 font-semibold">Artists</p>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                          {storyParticipants.residents.filter(r => r.name).map((artist, idx) => (
                            <div key={idx} className="card-bg p-4 text-center hover:border-indigo-500/30 transition-all">
                              <div className="w-14 h-14 rounded-full mx-auto mb-3 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-indigo-500/20 flex items-center justify-center">
                                <span className="text-indigo-400 font-bold text-lg">{artist.name.charAt(0)}</span>
                              </div>
                              <h4 className="text-sm font-bold text-white truncate">{artist.name}</h4>
                              {artist.extraLinks && artist.extraLinks.length > 0 && (
                                <div className="flex justify-center gap-1 mt-2">
                                  {artist.extraLinks.slice(0, 3).map((link, li) => {
                                    const lt = LINK_TYPE_OPTIONS.find(o => o.value === link.type);
                                    return lt ? (
                                      <span key={li} className="w-2 h-2 rounded-full" style={{backgroundColor: lt.color}} title={lt.label}></span>
                                    ) : null;
                                  })}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* Partners — enhanced with traffic + links */}
                    {partners.filter(p => p.name).length > 0 && (
                      <div>
                        <p className="text-sm text-slate-500 uppercase tracking-wider mb-4 font-semibold">Partners</p>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          {partners.filter(p => p.name).map((partner, idx) => {
                            const pTraffic = (partner.trafficSources || []).filter(s => s.url);
                            const pLinks = [
                              partner.landingUrl && 'Landing',
                              partner.link && 'Website',
                              partner.offerUrl && 'Offer',
                              partner.promoUrl && 'Promo',
                              ...(partner.extraLinks || []).filter(l => l.url).map(l => l.type)
                            ].filter(Boolean);
                            return (
                              <div key={idx} className="card-bg p-4 text-center hover:border-orange-500/20 transition-all">
                                <div className="w-12 h-12 rounded-xl mx-auto mb-3 bg-orange-500/10 border border-orange-500/15 flex items-center justify-center">
                                  <span className="text-orange-400 font-bold">{partner.name.charAt(0)}</span>
                                </div>
                                <h4 className="text-sm font-bold text-white truncate">{partner.name}</h4>
                                <p className="text-xs text-slate-500 truncate">{partner.company}</p>
                                {(pTraffic.length > 0 || pLinks.length > 0) && (
                                  <div className="flex justify-center gap-1 mt-2 flex-wrap">
                                    {pTraffic.map((s, si) => {
                                      const info = TRAFFIC_SOURCE_OPTIONS.find(o => o.value === s.type);
                                      return info ? <span key={'t'+si} className="w-2 h-2 rounded-full" style={{backgroundColor: info.color}} title={info.label}></span> : null;
                                    })}
                                    {pLinks.length > 0 && <span className="text-[8px] text-slate-600 ml-1">{pLinks.length} link{pLinks.length > 1 ? 's' : ''}</span>}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    {storyParticipants.residents.filter(r => r.name).length === 0 && partners.filter(p => p.name).length === 0 && (
                      <div className="card-bg p-8 text-center">
                        <p className="text-slate-500">Add artists and partners in the Collective step</p>
                      </div>
                    )}
                  </div>

                  {/* ===== SHARE LINK + DEPOSITS REMINDER ===== */}
                  <div className="card-bg p-6 flex flex-col md:flex-row items-center gap-4">
                    <div className="flex-1">
                      <h3 className="poppins font-semibold text-white mb-1">Share This Page</h3>
                      <p className="text-xs text-slate-400">Every share through your link earns ReadyStack Deposits. The more your fans share, the more they earn.</p>
                    </div>
                    <div className="flex gap-2 w-full md:w-auto">
                      <input type="text" value={`https://readystack.ai/d/${stackLabel.replace(/\s+/g, '-').toLowerCase()}`} readOnly className="input-field flex-1 md:w-72 text-sm" />
                      <button className="btn-primary flex-shrink-0">Copy</button>
                    </div>
                  </div>

                  {/* Footer note */}
                  <div className="text-center mt-8">
                    <p className="text-xs text-slate-600">Powered by ReadyStack — Market Relationship Management Platform</p>
                  </div>
                </div>
                );
              })()}

              {/* NOTE: Automation (old tab 7) is removed from the v3 rail. State variables and handlers are preserved for future use. */}
            </div>
          </div>

          {/* ========== SECTION: RENDER - FOOTER ========== */}
          {/* FOOTER */}
          <footer className="border-t border-white/5 mt-12 py-8 px-6">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-slate-600">
              <p>Makesbridge Technology, Inc. 2026. All rights reserved.</p>
              <p className="mt-2 md:mt-0">ReadyStack — Market Relationship Management Platform</p>
            </div>
          </footer>
        </div>
      );
    }

    {/* ========== SECTION: MOUNT ========== */}
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicDistrictApp />);
  </script>
</body>
</html>
