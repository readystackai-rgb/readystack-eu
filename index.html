                          <div className="text-left"><p className="text-[9px] font-black uppercase tracking-widest mb-1 italic opacity-80">{b.lab}</p><div className="flex flex-col gap-0.5 mt-2"><div className="text-3xl font-black italic tracking-tighter leading-none">{b.val}</div>{b.pct && <div className="text-[12px] font-bold italic opacity-60 leading-none">{b.pct}</div>}</div></div>
                          <p className="text-[8px] uppercase font-black tracking-widest opacity-80">{b.sub}</p>
                          <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-950/95 backdrop-blur-xl rounded-[24px] flex items-center justify-center p-6 text-center border border-white/10 pointer-events-none z-50"><p className="text-[10px] font-black uppercase tracking-widest italic leading-relaxed text-indigo-300">{b.tip}</p></div>
                       </div>
                    ))}
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter">SIGNAL HEAT MAP</h4><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest">Density of ecosystem signals over a 24-hour baseline</p></div><div className="flex gap-4"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-slate-700"></div><span className="text-[8px] font-black uppercase text-slate-500">Low Density</span></div><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-500"></div><span className="text-[8px] font-black uppercase text-slate-500">High Density</span></div></div></div>
                   <SignalHeatMap stages={stages} mapping={mapping} />
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left"><div className="flex items-center gap-4"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter">YOUTUBE MOMENTUM</h4><span className="bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded text-[7px] font-black text-emerald-400 uppercase tracking-widest h-fit mt-1">Trust Verified</span></div><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest">ReadyStack Views vs. Total YouTube Views</p></div><div className="flex flex-col gap-4 text-[9px] font-black uppercase tracking-widest italic text-right"><div className="flex items-center justify-end gap-3 text-[#FF0000]"><div className="w-2 h-2 rounded-full bg-[#FF0000]"></div> TOTAL YOUTUBE VIEWS</div><div className="flex items-center justify-end gap-3 text-white"><div className="w-2 h-2 rounded-full bg-white"></div> READYSTACK VIEWS</div></div></div>
                   <div className="grid grid-cols-2 gap-12">{stages.map((s) => (<div key={s.id} className="space-y-4"><p className="text-[10px] font-black uppercase tracking-widest italic opacity-60" style={{ color: s.color }}>{s.label} Momentum</p><div className="h-40 flex items-end border-b border-white/5 pb-2"><HoldingPowerChart datasets={[{ color: '#FF0000', label: 'Total', points: [80, 85, 88, 86, 92, 95, 94, 90, 96, 98, 95, 110], isBaseline: true }, { color: '#ffffff', label: 'ReadyStack', points: [12, 32, 22, 48, 58, 55, 78, 72, 88, 92, 85, 102] }]} /></div></div>))}</div>
                </div>
                <div className="bg-[#0f172a]/30 p-12 rounded-[56px] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] relative">
                   <div className="flex justify-between items-start mb-12"><div className="text-left text-left"><h4 className="text-white font-black text-[22px] uppercase italic tracking-tighter text-left">COMMERCE MOMENTUM</h4><p className="text-[10px] text-slate-500 uppercase font-black mt-2 italic tracking-widest text-left">Correlate Preview visits to Sharing activity and Sourcing probability</p></div><div className="flex flex-col gap-4 text-[9px] font-black uppercase tracking-widest italic text-right"><div className="flex items-center justify-end gap-3 text-white"><div className="w-2 h-2 rounded-full bg-white"></div> PREVIEW ENTRY</div><div className="flex items-center justify-end gap-3 text-[#48c9b0]"><div className="w-2 h-2 rounded-full bg-[#48c9b0]"></div> SHARING ACTIVITY</div><div className="flex items-center justify-end gap-3 text-[#7c8cff]"><div className="w-2 h-2 rounded-full bg-[#7c8cff]"></div> SOURCING DELTA</div></div></div>
                   <div className="h-96 flex items-end pt-8"><HoldingPowerChart datasets={[{ color: '#ffffff', label: 'Preview', points: [30, 45, 40, 55, 70, 65, 80, 75, 85, 90, 88, 95] }, { color: '#48c9b0', label: 'Sharing', points: [10, 15, 25, 20, 35, 45, 40, 50, 65, 60, 75, 70] }, { color: '#7c8cff', label: 'Sourcing', points: [5, 8, 12, 10, 18, 25, 22, 30, 45, 42, 55, 60] }]} /></div>
                </div>
              </div>
            )}
{/* MARKER_149 */}

{/* MARKER_150 */}
            {activeTab === 'g4' && (
              <div className="bg-white rounded-[40px] shadow-2xl overflow-hidden animate-fade-in text-left font-sans pt-16">
                <div className="bg-[#f8f9fa] border-b border-slate-200 px-10 py-6 flex justify-between items-center">
                  <div className="flex items-center gap-4"><i data-lucide="table" className="w-6 h-6 text-indigo-600"></i><h4 className="text-[#3c4043] font-bold text-lg tracking-tight leading-none uppercase italic">GA4 Registry Log</h4></div>
                  <div className="bg-white/10 p-2 rounded-lg flex items-center justify-center border border-white/20"><DistrictSquareIcon size={20} /></div>
                </div>
                <div className="p-10">
                    <table className="w-full text-slate-800">
                        <thead><tr className="text-[11px] text-[#5f6368] uppercase font-black border-y border-slate-200"><th className="py-4 px-4 text-left">Event ID</th><th className="py-4 px-4 text-center">Medium</th><th className="py-4 px-4 text-right">Aggregate Count</th></tr></thead>
                        <tbody>{(nodes.items || []).filter(n => !n.isTrafficSource).map((n, i) => (
                            <tr key={i} className="border-b border-slate-100 text-[12px] text-[#3c4043] hover:bg-slate-50 transition-colors"><td className="py-6 px-4 font-mono font-bold italic tracking-tighter opacity-80 uppercase text-left">{n.vendor.toLowerCase()}_{n.label.toLowerCase().replace(/\s/g, '_')}</td><td className="py-6 px-4 text-center"><span className="px-4 py-1.5 bg-slate-100 rounded-full font-black text-[10px] uppercase italic text-slate-500 tracking-tighter">{n.type}</span></td><td className="py-6 px-4 text-right font-black text-indigo-600">{(n.ga4Count || 0).toLocaleString()}</td></tr>
                        ))}</tbody>
                    </table>
                </div>
              </div>
            )}

            </div>
{/* MARKER_199 */}


          </main>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
