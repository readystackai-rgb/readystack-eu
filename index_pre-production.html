          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, backoff));
            return fetchWithRetry(url, options, retries - 1, backoff * 2);
          }
          throw error;
        }

                        <div className="flex items-center gap-3 mb-4">
                          <span className="text-[12px] font-black text-white uppercase italic tracking-tight">{name}</span>
                          <span className="text-xs font-bold text-slate-300">{totalItems} items</span>
                        </div>
                        <div className="flex gap-1 h-3 rounded-full overflow-hidden bg-[#020617]">
                          {stageBreakdown.map(s => s.count > 0 && (
                            <div key={s.id} className="h-full transition-all" style={{ flex: s.count, backgroundColor: s.color }}></div>
                          ))}
                        </div>
                        <div className="flex gap-3 mt-3">
                          {stageBreakdown.map(s => (
                            <div key={s.id} className="flex items-center gap-1">
                              <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: s.color }}></div>
                              <span className="text-xs font-black uppercase" style={{ color: s.color }}>{s.count}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

              </div>
            )}

            </div>


          {/* ── INVITE LINK MODAL ── */}
          {inviteModalData && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={() => setInviteModalData(null)}>
              <div className="bg-[#0f172a] border border-white/10 rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl" onClick={(e) => e.stopPropagation()}>
                <div className="text-center space-y-6">
                  <div>
                    <h3 className="text-lg font-black text-white uppercase tracking-tight" style={{fontFamily:'Poppins,sans-serif'}}>Invite Link Ready</h3>
                    <p className="text-sm text-slate-300 mt-2">
                      Send this link to <span className="text-white font-bold">{inviteModalData.participantName}</span> via your preferred channel.
                    </p>
                  </div>

                  <div className="bg-[#020617] border border-slate-700 rounded-xl p-4 flex items-center gap-3">
                    <input
                      readOnly
                      value={inviteModalData.url}
                      className="flex-1 bg-transparent text-xs text-slate-300 font-mono outline-none truncate"
                      onClick={(e) => e.target.select()}
                    />
                    <button
                      onClick={() => {
                        navigator.clipboard.writeText(inviteModalData.url);
                        const btn = document.getElementById('copy-invite-btn');
                        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); }
                      }}
                      id="copy-invite-btn"
                      className="px-4 py-2 bg-indigo-500 text-white text-xs font-black uppercase tracking-widest rounded-lg hover:bg-indigo-400 transition-colors shrink-0"
                    >
                      Copy
                    </button>
                  </div>

                  <div className="space-y-2">
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">
                      Role: {inviteModalData.role}
                    </p>
                    <p className="text-[10px] text-slate-500">
                      Link expires in 30 days. The first person to sign in claims this invite.
                    </p>
                  </div>

                  <button
                    onClick={() => setInviteModalData(null)}
                    className="text-xs text-slate-300 hover:text-white transition-colors font-bold uppercase tracking-widest"
                  >
                    Done
                  </button>
                </div>
              </div>
            </div>
          )}

          </main>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
